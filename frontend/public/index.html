<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0f1e" />
    <meta
      name="description"
      content="Sistem Monitoring Kepiting Otomatis berbasis AI — Raspberry Pi 5"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>🦀 CrabMonitor AI — Sistem Monitoring Kepiting</title>
    <style>
      body { margin: 0; background: #0a0f1e; }
      #root { min-height: 100vh; }
      /* Loading screen */
      .app-loading {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0a0f1e; color: #f1f5f9;
        font-family: 'Inter', sans-serif;
        gap: 16px;
      }
      .app-loading .logo { font-size: 64px; animation: bounce 1s infinite; }
      .app-loading h1 { font-size: 24px; font-weight: 800; margin: 0; }
      .app-loading p  { font-size: 14px; color: #64748b; margin: 0; }
      .loading-bar {
        width: 200px; height: 3px;
        background: rgba(99,102,241,0.2); border-radius: 2px; overflow: hidden;
      }
      .loading-fill {
        height: 100%; border-radius: 2px;
        background: linear-gradient(90deg, #6366f1, #06b6d4);
        animation: loading 1.5s ease-in-out infinite;
      }
      @keyframes bounce {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes loading {
        0% { width: 0%; margin-left: 0; }
        50% { width: 70%; margin-left: 15%; }
        100% { width: 0%; margin-left: 100%; }
      }
    </style>
  </head>
  <body>
    <noscript>
      Aktifkan JavaScript untuk menggunakan aplikasi ini.
    </noscript>

    <!-- Loading screen (hilang setelah React mount) -->
    <div class="app-loading" id="app-loading">
      <div class="logo">🦀</div>
      <h1>CrabMonitor AI</h1>
      <p>Sistem Monitoring Kepiting Otomatis</p>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>

    <div id="root"></div>

    <script>
      // Sembunyikan loading screen setelah React mount
      window.addEventListener('load', function() {
        setTimeout(function() {
          var el = document.getElementById('app-loading');
          if (el) {
            el.style.opacity = '0';
            el.style.transition = 'opacity 0.3s';
            setTimeout(function() { el.remove(); }, 300);
          }
        }, 500);
      });
    </script>
  </body>
</html>
