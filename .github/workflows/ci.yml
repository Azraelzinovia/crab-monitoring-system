name: 🦀 Crab Monitoring System — CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python FastAPI)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: crab_test
          POSTGRES_USER: crab_admin
          POSTGRES_PASSWORD: crab_secure_2024
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run syntax check
        working-directory: backend
        run: python -m py_compile main.py core/config.py core/database.py

      - name: Check imports
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://crab_admin:crab_secure_2024@localhost:5432/crab_test
        run: |
          python -c "from core.config import settings; print('Config OK')"
          python -c "from models.schemas import CrabResponse; print('Schemas OK')"

      - name: Run API health check
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://crab_admin:crab_secure_2024@localhost:5432/crab_test
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/ || exit 1
          curl -f http://localhost:8000/health || exit 1
          echo "✅ API health check passed"

  # ── Frontend Tests ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:8000
          CI: false  # Disable treating warnings as errors
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/master'
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ── Security Scan ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Python dependency audit
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2023-228 || true

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          push: false
          tags: crab-monitoring/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend
          push: false
          tags: crab-monitoring/frontend:latest
          build-args: |
            REACT_APP_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run docker compose validation
        run: docker compose -f docker/docker-compose.yml config --quiet

  # ── Summary ──────────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: Report Status
        run: |
          echo "## 🦀 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
