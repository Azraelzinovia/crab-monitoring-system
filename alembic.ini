# Alembic Configuration File
# Dokumentasi: https://alembic.sqlalchemy.org/

[alembic]
script_location = alembic
prepend_sys_path = .

# URL database — override via env var saat runtime
sqlalchemy.url = postgresql+asyncpg://crab_admin:crab_secure_2024@localhost:5432/crab_monitoring

[post_write_hooks]
# Format SQL migrations (opsional)
# hooks = autopep8
# autopep8.type = console_scripts
# autopep8.entrypoint = autopep8
# autopep8.options = -i REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
